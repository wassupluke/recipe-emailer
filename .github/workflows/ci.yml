name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  quality-checks:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[dev]"

    - name: Code Formatting Check (Black)
      run: |
        black --check .
      continue-on-error: false

    - name: Linting (Ruff)
      run: |
        ruff check .
      continue-on-error: false

    - name: Type Checking (Mypy)
      run: |
        mypy . --strict
      continue-on-error: true

    - name: Run Tests
      run: |
        pytest tests/ -v --cov --cov-report=xml --cov-report=term-missing
      continue-on-error: false

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.python-version }}
        fail_ci_if_error: false

    - name: Archive Coverage Reports
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety

    - name: Run Bandit (Security Linter)
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -f screen
      continue-on-error: true

    - name: Check Dependencies (Safety)
      run: |
        safety check --json || true
        safety check
      continue-on-error: true

    - name: Upload Security Reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pydocstyle interrogate

    - name: Check Docstring Coverage
      run: |
        interrogate -v --fail-under 95 .

    - name: Check Docstring Style
      run: |
        pydocstyle --convention=google .
      continue-on-error: true

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-benchmark

    - name: Run Performance Benchmarks
      run: |
        # Add performance tests when available
        echo "Performance benchmarks placeholder"

  build-status:
    name: Build Status Check
    runs-on: ubuntu-latest
    needs: [quality-checks, security-scan, documentation]
    if: always()

    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.quality-checks.result }}" != "success" ]; then
          echo "Quality checks failed"
          exit 1
        fi
        if [ "${{ needs.security-scan.result }}" != "success" ]; then
          echo "Security scan failed"
          exit 1
        fi
        if [ "${{ needs.documentation.result }}" != "success" ]; then
          echo "Documentation check failed"
          exit 1
        fi
        echo "All checks passed!"

    - name: Post Status
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ All CI checks passed! Ready for review.'
          })
